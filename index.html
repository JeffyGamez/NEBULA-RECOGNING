<!DOCTYPE html>
<html>
<head>
    <title>NEBULA_RECKONING_RPG</title>
    <style>
        body { margin: 0; background: #050505; color: #00ff88; font-family: 'Courier New', monospace; overflow: hidden; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .panel { position: absolute; background: rgba(0,20,10,0.9); border: 2px solid #00ff88; padding: 15px; pointer-events: all; }
        #stats { top: 20px; left: 20px; }
        #inventory { top: 20px; right: 20px; width: 200px; }
        #merchant-ui, #level-up { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; }
        button { background: #000; border: 1px solid #00ff88; color: #00ff88; cursor: pointer; padding: 10px; width: 100%; margin-top: 5px; }
        button:hover { background: #00ff88; color: #000; }
        #world-info { bottom: 20px; left: 50%; transform: translateX(-50%); text-align: center; color: #fff; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div id="ui">
    <div id="stats" class="panel">
        LVL: <span id="lvl">1</span> | GEMS: <span id="gems">0</span><br>
        HP: <div style="width:100px; height:10px; background:#222; display:inline-block;"><div id="hp-bar" style="width:100%; height:100%; background:#ff0055;"></div></div>
    </div>

    <div id="inventory" class="panel">
        <b>INVENTORY</b>
        <div id="inv-list" style="font-size:12px; margin-top:10px;">- Empty -</div>
    </div>

    <div id="merchant-ui" class="panel">
        <h3>INTERGALACTIC MERCHANT</h3>
        <button onclick="buy('shield')">Buy Edisite Shield (100 Gems)</button>
        <button onclick="buy('armor')">Upgrade Armor (50 Gems)</button>
        <button onclick="closeMerchant()">Exit</button>
    </div>

    <div id="world-info">PORTAL TO WORLD #<span id="wnum">?</span><br><small>Press [E] to ENTER</small></div>
</div>

<canvas id="g"></canvas>

<script>
const canvas = document.getElementById('g');
const ctx = canvas.getContext('2d');

// --- GAME STATE ---
let mode = 'HUB'; // HUB or DUNGEON
let player = { x: 0, y: 0, gems: 0, lvl: 1, hp: 100, inv: [], hasShield: false };
let worlds = [];
let keys = {};
let currentWorld = null;

// Generate 100 Worlds in No Man's Land
function genWorlds() {
    for(let i=1; i<=100; i++) {
        worlds.push({
            id: i,
            x: (Math.random() - 0.5) * 3000,
            y: (Math.random() - 0.5) * 3000,
            difficulty: Math.floor(Math.random() * 60) + 1,
            boss: i === 33 ? 'Main Computer' : (i === 66 ? 'Plutonium Giant' : (i === 100 ? 'Hyperdrive Core' : null))
        });
    }
}

function init() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    genWorlds();
}

function draw() {
    ctx.fillStyle = '#050505';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const cx = canvas.width/2 - player.x;
    const cy = canvas.height/2 - player.y;

    if(mode === 'HUB') {
        // Draw Wrecked Meteor Ship
        ctx.fillStyle = '#444';
        ctx.beginPath(); ctx.arc(cx, cy, 80, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#00ff88'; ctx.fillText("CRASHED METEOR SHIP", cx-50, cy-90);

        // Draw Merchant
        ctx.fillStyle = '#ffed00';
        ctx.fillRect(cx + 150, cy - 50, 40, 40);
        ctx.fillText("MERCHANT", cx + 145, cy - 60);

        // Draw Portals (The 100 Worlds)
        let nearWorld = null;
        worlds.forEach(w => {
            let dist = Math.sqrt((player.x - w.x)**2 + (player.y - w.y)**2);
            ctx.strokeStyle = `hsl(${w.id * 3.6}, 100%, 50%)`;
            ctx.beginPath(); ctx.arc(cx + w.x, cy + w.y, 30, 0, Math.PI*2); ctx.stroke();
            if(dist < 50) nearWorld = w;
        });

        document.getElementById('world-info').style.opacity = nearWorld ? 1 : 0;
        if(nearWorld) {
            document.getElementById('wnum').innerText = nearWorld.id;
            if(keys['e']) enterWorld(nearWorld);
        }

        // Check Merchant collision
        let mDist = Math.sqrt((player.x - 170)**2 + (player.y - (-30))**2);
        if(mDist < 60 && keys['e']) document.getElementById('merchant-ui').style.display = 'block';

    } else if(mode === 'DUNGEON') {
        ctx.fillStyle = '#111';
        ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.fillText(`EXPLORING WORLD #${currentWorld.id} (DIFFICULTY: ${currentWorld.difficulty})`, 50, 50);
        ctx.fillText("BOSS: " + (currentWorld.boss || "None"), 50, 70);
        if(keys['q']) mode = 'HUB'; // Escape
    }

    // Player
    ctx.fillStyle = '#fff';
    ctx.fillRect(canvas.width/2-10, canvas.height/2-10, 20, 20);

    update();
    requestAnimationFrame(draw);
}

function update() {
    if(keys['w']) player.y -= 5;
    if(keys['s']) player.y += 5;
    if(keys['a']) player.x -= 5;
    if(keys['d']) player.x += 5;

    document.getElementById('gems').innerText = player.gems;
    document.getElementById('lvl').innerText = player.lvl;
}

function enterWorld(w) {
    currentWorld = w;
    if(w.difficulty > 10 && !player.hasShield) {
        alert("CRITICAL ERROR: High radiation detected. You need an Edisite Shield to survive this world's explosion!");
        return;
    }
    mode = 'DUNGEON';
}

function buy(item) {
    if(item === 'shield' && player.gems >= 100) {
        player.gems -= 100;
        player.hasShield = true;
        player.inv.push("Edisite Shield");
        updateInv();
        alert("Shield acquired!");
    }
}

function updateInv() {
    document.getElementById('inv-list').innerHTML = player.inv.map(i => `- ${i}`).join('<br>');
}

function closeMerchant() { document.getElementById('merchant-ui').style.display = 'none'; }

window.onkeydown = e => keys[e.key.toLowerCase()] = true;
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
window.onresize = init;

init(); draw();
</script>
</body>
</html>
