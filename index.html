<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEBULA_RECKONING_v1.0</title>
    <style>
        :root { --neon: #00ff88; --dark: #050505; --ui: #111; }
        body { margin: 0; background: var(--dark); color: var(--neon); font-family: 'Consolas', monospace; overflow: hidden; }
        
        /* UI LAYOUT */
        #game-container { display: grid; grid-template-columns: 1fr 300px; height: 100vh; }
        #render-zone { position: relative; border-right: 2px solid #222; }
        #sidebar { background: var(--ui); padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        /* GAUGES */
        .bar { height: 10px; background: #222; border: 1px solid #444; position: relative; margin-top: 5px; }
        .fill { height: 100%; transition: width 0.3s; }
        #hp-fill { background: #ff4444; box-shadow: 0 0 10px #ff4444; }
        #xp-fill { background: #4444ff; box-shadow: 0 0 10px #4444ff; }
        
        /* LOG */
        #combat-log { flex-grow: 1; border: 1px solid #333; padding: 10px; font-size: 11px; overflow-y: auto; background: #000; }
        .log-entry { margin-bottom: 5px; border-left: 2px solid var(--neon); padding-left: 5px; }
        
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }
        .controls { font-size: 10px; color: #888; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="render-zone">
        <canvas id="stage"></canvas>
    </div>
    
    <div id="sidebar">
        <div>
            <h2 style="margin:0; color:#fff;">NEBULA_OS</h2>
            <div style="font-size: 12px;">LEVEL: <span id="lvl">1</span> RECKONER</div>
        </div>

        <div>
            CORE_INTEGRITY
            <div class="bar"><div id="hp-fill" class="fill" style="width: 100%;"></div></div>
        </div>

        <div>
            DATA_SYNC (XP)
            <div class="bar"><div id="xp-fill" class="fill" style="width: 0%;"></div></div>
        </div>

        <div id="combat-log">
            <div class="log-entry">SYSTEM_BOOT: SUCCESSful</div>
            <div class="log-entry">WORLD_GEN: INFINITE_MODE</div>
        </div>

        <div class="controls">
            [W,A,S,D] NAVIGATION<br>
            [SPACE] DISCHARGE_PULSE<br>
            [MOUSE] TARGETING
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');
    const logBox = document.getElementById('combat-log');
    
    // --- ENGINE STATE ---
    const world = {
        grid: 40,
        entities: [],
        particles: [],
        camera: { x: 0, y: 0 },
        tick: 0
    };

    const player = {
        x: 0, y: 0,
        hp: 100, maxHp: 100,
        xp: 0, nextLvl: 100, lvl: 1,
        speed: 5,
        w: 20, h: 20
    };

    // --- LOGIC: LOGGING SYSTEM ---
    function log(msg) {
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logBox.prepend(div);
    }

    // --- LOGIC: ENTITY GENERATOR ---
    function spawnEnemy() {
        const angle = Math.random() * Math.PI * 2;
        const dist = 600;
        world.entities.push({
            x: player.x + Math.cos(angle) * dist,
            y: player.y + Math.sin(angle) * dist,
            hp: 30,
            speed: 2 + Math.random() * 2,
            type: 'SENTINEL'
        });
    }

    // --- LOGIC: COMBAT MATH ---
    function firePulse() {
        world.particles.push({
            x: player.x, y: player.y,
            vx: (mouse.x - (canvas.width/2)) / 20,
            vy: (mouse.y - (canvas.height/2)) / 20,
            life: 60
        });
        log("PULSE_DISCHARGED");
    }

    // --- RENDER LOOP ---
    let keys = {};
    let mouse = { x: 0, y: 0 };

    function loop() {
        // Resize Fix
        if(canvas.width !== canvas.offsetWidth) {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }

        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 1. INPUT HANDLING
        if(keys['w']) player.y -= player.speed;
        if(keys['s']) player.y += player.speed;
        if(keys['a']) player.x -= player.speed;
        if(keys['d']) player.x += player.speed;

        // 2. WORLD RENDERING (The Grid)
        ctx.strokeStyle = '#111';
        const offsetX = -player.x % world.grid;
        const offsetY = -player.y % world.grid;
        
        for(let x = offsetX; x < canvas.width; x += world.grid) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for(let y = offsetY; y < canvas.height; y += world.grid) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        // 3. ENTITY UPDATE
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        world.entities.forEach((en, i) => {
            const dx = player.x - en.x;
            const dy = player.y - en.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            // AI Movement
            en.x += (dx / dist) * en.speed;
            en.y += (dy / dist) * en.speed;

            // Draw Enemy
            ctx.fillStyle = '#ff4444';
            ctx.fillRect(en.x - player.x + centerX, en.y - player.y + centerY, 15, 15);

            // Collision
            if(dist < 20) {
                player.hp -= 0.5;
                document.getElementById('hp-fill').style.width = player.hp + '%';
            }
        });

        // 4. PLAYER RENDER
        ctx.fillStyle = '#00ff88';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00ff88';
        ctx.fillRect(centerX - 10, centerY - 10, 20, 20);
        ctx.shadowBlur = 0;

        // 5. SYSTEMS
        if(world.tick % 100 === 0) spawnEnemy();
        world.tick++;

        requestAnimationFrame(loop);
    }

    // --- EVENT LISTENERS ---
    window.addEventListener('keydown', e => { 
        keys[e.key.toLowerCase()] = true; 
        if(e.code === 'Space') firePulse();
    });
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
    canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
    });

    log("AWAITING_INPUT...");
    loop();
</script>
</body>
</html>
